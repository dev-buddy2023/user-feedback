name: 💡 Feature Request
description: 提一个新功能建议 / Suggest an idea
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢建议！Thanks for your idea!
  - type: input
    id: title
    attributes:
      label: 功能名称 / Feature Name
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 解决了什么问题 / What problem does this solve?
      description: 描述你遇到的痛点或需求
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 你想要的方案 / Describe the solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: 优先级 / Priority
      options:
        - 🔥 High (blocking)
        - 👍 Medium (important)
        - 👎 Low (nice-to-have)
    validations:
      required: true
