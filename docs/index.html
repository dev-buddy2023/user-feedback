<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户反馈中心 · User Feedback</title>
  <meta name="description" content="公开透明的用户反馈系统 - Powered by GitHub Issues" />
  <meta property="og:title" content="用户反馈中心" />
  <meta property="og:description" content="提交反馈，追踪进度" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📬</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --purple: #bc8cff;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Noto Sans SC, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

    /* Header */
    header { text-align: center; padding: 48px 0 32px; }
    header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); font-size: 1rem; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-num { display: block; font-size: 1.5rem; font-weight: 700; }
    .stat-label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .stat-card.open .stat-num { color: var(--green); }
    .stat-card.closed .stat-num { color: var(--text-muted); }
    .stat-card.bug .stat-num { color: var(--red); }
    .stat-card.feature .stat-num { color: var(--purple); }

    /* CTA */
    .cta { display: flex; gap: 12px; justify-content: center; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 24px; border-radius: var(--radius);
      text-decoration: none; font-weight: 600; font-size: 0.95rem;
      transition: all 0.2s;
    }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--text-muted); }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab {
      padding: 6px 14px; border-radius: 999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s;
    }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Issues */
    .issues { display: flex; flex-direction: column; gap: 8px; }
    .issue-card {
      display: flex; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      transition: border-color 0.2s;
    }
    .issue-card:hover { border-color: var(--text-muted); }
    .issue-state { font-size: 1.1rem; padding-top: 2px; }
    .issue-body { flex: 1; min-width: 0; }
    .issue-title {
      color: var(--text); text-decoration: none; font-weight: 600;
      font-size: 0.95rem; display: block; margin-bottom: 4px;
    }
    .issue-title:hover { color: var(--accent); }
    .issue-meta { color: var(--text-muted); font-size: 0.8rem; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .issue-labels { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .label {
      font-size: 0.75rem; padding: 2px 8px; border-radius: 999px;
      background: color-mix(in srgb, var(--label-color, #58a6ff) 20%, transparent);
      color: var(--label-color, #58a6ff);
      border: 1px solid color-mix(in srgb, var(--label-color, #58a6ff) 40%, transparent);
    }

    .empty { text-align: center; color: var(--text-muted); padding: 48px 0; font-size: 1.1rem; }

    /* Loading / Error */
    .loading, .error {
      text-align: center; padding: 64px 0;
      color: var(--text-muted); font-size: 1.1rem;
    }
    .error { color: var(--red); }

    /* Footer */
    footer { text-align: center; padding: 48px 0 24px; color: var(--text-muted); font-size: 0.85rem; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
      header h1 { font-size: 1.5rem; }
      .cta { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="app"><div class="loading">正在加载反馈数据…</div></div>
  <script>
    // ⚡ 修改这里 ⚡ - 填上你的 Google Form 链接
    window.__FORM_URL__ = 'https://forms.google.com/your-form-link';
  </script>
  <script defer src="app.js"></script>
</body>
</html>
